// ── CAL BADGE ─────────────────────────────────────────────────
function CalBadge({d,out,locked,lost,T}){
  const s={display:'inline-flex',alignItems:'center',borderRadius:20,padding:'2px 9px',fontSize:11,fontWeight:700,gap:3};
  if(lost)return SPAN({style:{...s,background:T.rBg,border:'1px solid '+T.rBd,color:T.red}},'⚠ LOST');
  if(locked)return SPAN({style:{...s,background:T.pBg,border:'1px solid '+T.pBd,color:T.purple}},'🔒 LOCKED');
  if(out)return SPAN({style:{...s,background:T.oBg,border:'1px solid '+T.oBd,color:T.orange}},'● OUT');
  if(d===null)return SPAN({style:{...s,background:T.gBg,border:'1px solid '+T.gBd,color:T.green}},'● AVAIL');
  if(d<0)return SPAN({style:{...s,background:T.rBg,border:'1px solid '+T.rBd,color:T.red,animation:'pulse 1.5s infinite'}},'⚠ OVERDUE');
  if(d<=30)return SPAN({style:{...s,background:T.yBg,border:'1px solid '+T.yBd,color:T.yellow}},'⏰ '+d+'d');
  return SPAN({style:{...s,background:T.gBg,border:'1px solid '+T.gBd,color:T.green}},'✓ '+d+'d');
}

// ── LOGIN ─────────────────────────────────────────────────────
function Login({onLogin,T}){
  const [u,sU]=useState('');
  const [p,sP]=useState('');
  const [err,sE]=useState('');
  const users=ld('ct_users',USERS_DEF);
  function go(){
    const found=users.find(x=>x.username.toLowerCase()===u.trim().toLowerCase()&&x.password===p);
    if(found)onLogin(found);
    else{sE('Wrong username or password');sP('');}
  }
  return DIV({style:{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}},
    DIV({style:{width:'100%',maxWidth:360},className:'fu'},
      DIV({style:{textAlign:'center',marginBottom:'2rem'}},
        DIV({style:{width:52,height:52,background:T.acc,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,margin:'0 auto 0.75rem'}},'🔧'),
        DIV({style:{fontSize:'1.75rem',fontWeight:900,color:T.text,letterSpacing:'-0.02em'}},'CalTrack'),
        DIV({style:{fontSize:'0.8rem',color:T.mut,marginTop:'0.2rem'}},'LL Blue Engineering')
      ),
      DIV({style:card(T)},
        err?DIV({style:{background:T.rBg,border:'1px solid '+T.rBd,color:T.red,borderRadius:8,padding:'0.55rem 0.8rem',marginBottom:'0.75rem',fontSize:'0.85rem'}},err):null,
        DIV({style:{marginBottom:'0.75rem'}},
          D('label',{style:{display:'block',fontSize:'0.7rem',color:T.mut,marginBottom:'0.25rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}},'Username'),
          INP({style:inp(T),value:u,onChange:e=>sU(e.target.value),onKeyDown:e=>e.key==='Enter'&&go(),autoFocus:true})

// ── TOOLS PAGE ────────────────────────────────────────────────
function ToolsPage({tools,setTools,cos,setCos,user,addFeed,isAdmin,T}){
  const [tab,setTab]=useState('tools');
  const [search,sS]=useState('');
  const [catF,sCF]=useState('All');
  const [editId,sEI]=useState(null);
  const [ed,sEd]=useState({});
  const [expand,setExpand]=useState(null);
  const [favs,setFavs]=useState(()=>ld('ct_favs',[]));
  const [hist,setHist]=useState(()=>ld('ct_hist',[]));
  const [locked,setLocked]=useState(()=>ld('ct_locked',{}));
  const [flash,doFlash]=useFlash();
  const sites=ld('ct_sites',SITES_DEF);

  function doOut(id,loc){
    if(locked[id])return doFlash('err','Tool is locked.');
    const t=tools.find(x=>x.id===id);
    const outAt=fts(new Date());
    setCos(p=>({...p,[id]:{by:user.name,location:loc,note:'',outAt,ret:''}}));
    const lh=ld('ct_lochist',{});lh[id]=lh[id]||[];lh[id].unshift({location:loc,by:user.name,at:outAt});sv('ct_lochist',lh);
    addFeed({type:'checkout',msg:user.name+' checked out '+t?.name+' → '+loc,ts:outAt});
    if(navigator.vibrate)navigator.vibrate(50);
    setExpand(null);doFlash('ok','Checked out — '+t?.name);
  }
  function doIn(id){
    const co=cos[id];if(!co)return;
    const inAt=fts(new Date());
    const t=tools.find(x=>x.id===id);
    const h=ld('ct_hist',[]);
    h.unshift({toolId:id,toolName:t?.name||id,by:co.by,location:co.location,outAt:co.outAt,inAt,ret:co.ret||''});
    sv('ct_hist',h);setHist(h);
    setCos(p=>{const n={...p};delete n[id];return n});
    addFeed({type:'checkin',msg:user.name+' checked in '+t?.name+' from '+co.location,ts:inAt});
    if(navigator.vibrate)navigator.vibrate([40,20,40]);
    doFlash('ok','Checked in — '+t?.name);
  }
  function saveEdit(id){
    setTools(p=>p.map(t=>{
      if(t.id!==id)return t;
      const u={...t,...ed};
      if(ed.lastCal&&ed.calDays)u.nextCal=addD(ed.lastCal,parseInt(ed.calDays));
      return u;
    }));
    sEI(null);doFlash('ok','Saved.');
  }
  function toggleFav(id){const f=favs.includes(id)?favs.filter(x=>x!==id):[id,...favs];setFavs(f);sv('ct_favs',f);}
  function toggleLock(id){
    if(locked[id]){const n={...locked};delete n[id];sv('ct_locked',n);setLocked(n);doFlash('ok','Unlocked.');}
    else{const n={...locked,[id]:{by:user.name,at:fts(new Date())}};sv('ct_locked',n);setLocked(n);doFlash('ok','Locked.');}
  }
  function exportHist(){
    const h=['Tool','By','Location','Out','In','Return'];
    const rows=hist.map(l=>[l.toolName,l.by,l.location,l.outAt,l.inAt||'Still Out',l.ret||'']);
    const blob=new Blob([[h,...rows].map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='checkouts.csv';a.click();
  }

  const cats=['All',...new Set(tools.map(t=>t.cat))];
  const filtered=tools.filter(t=>{
    const ms=t.name.toLowerCase().includes(search.toLowerCase())||t.id.toLowerCase().includes(search.toLowerCase());
    return ms&&(catF==='All'||t.cat===catF);
  }).sort((a,b)=>{const af=favs.includes(a.id)?0:1,bf=favs.includes(b.id)?0:1;return af-bf;});

  const TABS=[['tools','All Tools'],['bySite','By Site'],['byPerson','By Person'],['history','History']];

    DIV({style:{display:'flex',gap:'0.65rem',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap'}},

      ),

    ),

          DIV({style:{display:'flex',gap:'0.5rem',alignItems:'center'}},

            DIV(null,

            l.inAt?SPAN({style:{background:T.gBg,border:'1px solid '+T.gBd,color:T.green,borderRadius:20,padding:'2px 7px',fontSize:'0.68rem',fontWeight:700}},'✓ '+dur)

function PinLock({onUnlock,T}){

  function check(p){if(p===stored)onUnlock();else{sE(true);sP('');setTimeout(()=>sE(false),700);}}

    DIV({style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.65rem',width:200}},
      ...[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i)=>BTN({key:i,style:{background:k===''?'transparent':T.faint,color:T.text,border:'1px solid '+(k===''?'transparent':T.border),borderRadius:10,padding:'0.9rem',fontSize:'1.1rem',fontWeight:700,cursor:k===''?'default':'pointer',minHeight:50},onClick:()=>{

  window._ctAddFeed=addFeed;

  if(!user)return React.createElement(Login,{onLogin:login,T:T});
  if(pinLocked&&pinEnabled)return React.createElement(PinLock,{onUnlock:()=>setPinLocked(false),T:T});

  const PAGES=[['dashboard','🏠','Home'],['tools','🔧','Tools'],['scout','🔌','Scout'],['maintenance','🛠','Maint.'],['reports','📊','Reports'],['barcodes','🏷','Codes'],['profile','👤','Me'],['admin','⚙','Admin']];

  return DIV({style:{minHeight:'100vh',background:T.bg,color:T.text}},
    // Top nav
    DIV({className:'np',style:{background:T.surf,borderBottom:'1px solid '+T.border,padding:'0 0.85rem',display:'flex',alignItems:'center',gap:'0.3rem',height:48,position:'sticky',top:0,zIndex:100}},
      DIV({style:{display:'flex',alignItems:'center',gap:'0.4rem',marginRight:'0.35rem',flexShrink:0}},
        DIV({style:{width:24,height:24,background:T.acc,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}},'🔧'),
        SPAN({style:{fontWeight:900,fontSize:'0.88rem',color:T.text,letterSpacing:'-0.02em'}},'CalTrack')
      ),
      DIV({className:'dnm',style:{display:'flex',gap:'0.18rem',overflowX:'auto',flex:1}},
        ...PAGES.map(([id,icon,lbl])=>BTN({key:id,style:{background:tab===id?T.accD:'transparent',color:tab===id?T.acc:T.mut,border:'1px solid '+(tab===id?T.acc+'44':'transparent'),borderRadius:7,padding:'0.28rem 0.6rem',fontWeight:600,fontSize:'0.76rem',cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'0.25rem',minHeight:34},onClick:()=>setTab(id)},icon,' ',lbl))
      ),
      DIV({style:{marginLeft:'auto',display:'flex',gap:'0.3rem',alignItems:'center',flexShrink:0}},
        BTN({style:{background:T.faint,color:T.mut,border:'1px solid '+T.border,borderRadius:7,padding:'0.25rem 0.5rem',fontSize:'0.8rem',cursor:'pointer'},onClick:()=>setDark(!dark)},dark?'☀️':'🌙'),
        isAdmin
          ?BTN({style:{background:T.accD,color:T.acc,border:'1px solid '+T.acc+'44',borderRadius:7,padding:'0.25rem 0.6rem',fontWeight:600,fontSize:'0.72rem',cursor:'pointer'},onClick:()=>setIsAdmin(false)},'Admin ✕')
          :React.createElement(AdminUnlock,{onUnlock:()=>setIsAdmin(true),T:T}),
        SPAN({style:{fontSize:'0.73rem',color:T.mut,fontWeight:500,maxWidth:65,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},user.name),
        BTN({style:{background:T.faint,color:T.mut,border:'1px solid '+T.border,borderRadius:7,padding:'0.25rem 0.55rem',fontWeight:600,fontSize:'0.73rem',cursor:'pointer'},onClick:logout},'Sign Out')
      )
    ),
    // Page content
    DIV({className:'pc',style:{padding:'1rem',maxWidth:1080,margin:'0 auto'}},
      tab==='dashboard'?React.createElement(Dashboard,{...pageProps,feed,ann,setAnn}):null,
      tab==='tools'?React.createElement(ToolsPage,pageProps):null,
      tab==='scout'?React.createElement(ScoutPage,pageProps):null,
      tab==='maintenance'?React.createElement(MaintenancePage,pageProps):null,
      tab==='reports'?React.createElement(ReportsPage,{tools:tools,T:T}):null,
      tab==='barcodes'?React.createElement(BarcodesPage,{tools:tools,T:T}):null,
      tab==='profile'?React.createElement(ProfilePage,{user:user,setUser:setUser,T:T}):null,
      tab==='admin'?React.createElement(AdminPage,pageProps):null
    ),
    // Bottom nav mobile
    DIV({className:'bnav np',style:{display:'none',position:'fixed',bottom:0,left:0,right:0,background:T.surf,borderTop:'1px solid '+T.border,zIndex:200,padding:'0.25rem 0 0.4rem',justifyContent:'space-around',alignItems:'center'}},
      ...PAGES.slice(0,8).map(([id,icon,lbl])=>BTN({key:id,style:{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:'0.18rem',cursor:'pointer',padding:'0.25rem 0.4rem',minWidth:36},onClick:()=>setTab(id)},
        SPAN({style:{fontSize:18,lineHeight:1,opacity:tab===id?1:0.5}},icon),
        SPAN({style:{fontSize:'0.58rem',fontWeight:tab===id?700:500,color:tab===id?T.acc:T.mut}},lbl)
      ))
    )
  );
}

// ── MOUNT ─────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
