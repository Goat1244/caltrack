<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const du=d=>d?Math.ceil((new Date(d)-new Date())/86400000):null;

function Barcode({id,name}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d");ctx.fillStyle=T.card;ctx.fillRect(0,0,300,60);
    const label=id+"|"+name;const bars=[];
    bars.push({w:5,b:0},{w:2,b:1},{w:2,b:0},{w:2,b:1});
    for(let i=0;i<label.length;i++){const ch=label.charCodeAt(i);[ch&1?3:1,ch&2?1:2,ch&4?2:1,ch&8?3:1,ch&16?1:2,1].forEach((w,j)=>bars.push({w,b:j%2===0?1:0}));}
    bars.push({w:2,b:1},{w:2,b:0},{w:3,b:1},{w:5,b:0});
    const tot=bars.reduce((s,b)=>s+b.w,0);const uw=(288)/tot;let x=6;
    bars.forEach(({w,b})=>{if(b){ctx.fillStyle=T.text;ctx.fillRect(Math.round(x),3,Math.max(1,Math.round(uw*w)),40);}x+=uw*w;});
    ctx.fillStyle=T.mut;ctx.font="600 8px Inter,sans-serif";ctx.textAlign="center";
    ctx.fillText((id+" | "+name).slice(0,50),150,58);
  },[id,name]);
  return<canvas ref={ref} width={300} height={62} style={{display:"block",borderRadius:6}}/>;
}

function InlineCheckout({t,co,isLocked,sites,onOut,onIn}){
  const [open,setOpen]=useState(false);
  const [loc,setLoc]=useState("");
  const [custom,setCustom]=useState("");

  if(co){
    return(
      <div style={{display:"flex",flexDirection:"column",gap:"0.4rem",alignItems:"stretch",minWidth:130}}>
        <div style={{fontSize:"0.7rem",color:T.orange,fontWeight:600,textAlign:"center"}}>Out: {co.by}</div>
        <button
          style={{background:T.gBg,color:T.green,border:"2px solid "+T.gBd,borderRadius:9,padding:"0.55rem 1rem",fontWeight:700,fontSize:"0.85rem",cursor:"pointer",minHeight:40}}
          onClick={()=>{if(window.confirm("Check in "+t.name+"?"))onIn();}}>
          📥 Check In
        </button>
      </div>
    );
  }

  if(open){
    return(
      <div style={{display:"flex",flexDirection:"column",gap:"0.4rem",minWidth:200}}>
        <select
          autoFocus
          value={loc}
          onChange={e=>setLoc(e.target.value)}
          style={{background:T.faint,border:"2px solid "+T.acc,borderRadius:8,color:loc?T.text:T.mut,padding:"0.5rem 0.6rem",fontSize:"0.85rem",outline:"none",width:"100%"}}>
          <option value="">Pick a site…</option>
          {sites.map(s=><option key={s} value={s}>{s}</option>)}
          <option value="__other">Other…</option>
        </select>
        {loc==="__other"&&<input
          autoFocus
          value={custom}
          onChange={e=>setCustom(e.target.value)}
          placeholder="Type location…"
          style={{background:T.faint,border:"2px solid "+T.acc,borderRadius:8,color:T.text,padding:"0.5rem 0.6rem",fontSize:"0.85rem",outline:"none",width:"100%",boxSizing:"border-box"}}
        />}
        <div style={{display:"flex",gap:"0.35rem"}}>
          <button
            style={{flex:1,background:T.acc,color:"#fff",border:"none",borderRadius:8,padding:"0.5rem",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}
            onClick={()=>{
              const fl=loc==="__other"?custom.trim():loc;
              if(fl){onOut(fl);setOpen(false);setLoc("");setCustom("");}
            }}>
            Confirm
          </button>
          <button
            style={{background:T.faint,color:T.mut,border:"1px solid "+T.border,borderRadius:8,padding:"0.5rem 0.75rem",fontWeight:600,fontSize:"0.82rem",cursor:"pointer"}}
            onClick={()=>{setOpen(false);setLoc("");setCustom("");}}>
            ✕
          </button>
        </div>
      </div>
    );
  }

  return(
    <button
      style={{background:isLocked?T.faint:T.acc,color:isLocked?T.mut:"#fff",border:"2px solid "+(isLocked?T.border:T.acc),borderRadius:9,padding:"0.55rem 1.1rem",fontWeight:700,fontSize:"0.85rem",cursor:isLocked?"not-allowed":"pointer",minHeight:40,opacity:isLocked?0.4:1}}
      onClick={()=>{if(!isLocked&&t.cond!=="Lost")setOpen(true);}}>
      📤 Check Out
    </button>
  );
}

function ToolsPage({tools,setTools,isAdmin,cos,setCos,user,addFeed}){
  const [tab,setTab]=useState("tools");
  const [hist,setHist]=useState(()=>ld("ct_hist",[]));
  const [locked,setLocked]=useState(()=>ld("ct_locked",{}));
  const [search,sSearch]=useState("");
  const [catF,sCatF]=useState("All");
  const [editId,sEI]=useState(null);
  const [ed,sEd]=useState({});
  const [favs,setFavs]=useState(()=>ld("ct_favs",[]));
  const [expand,setExpand]=useState(null);
  const [confirm,sConfirm]=useState(null);
  const [msg,flash]=useMsg();
  const sites=ld("ct_sites",SITES_DEF);
  const cats=["All",...new Set(tools.map(t=>t.cat))];

  function doOut(id,loc,note,ret,by){
    
    if(locked[id])return flash("err","Tool is locked by admin.");
    const t=tools.find(x=>x.id===id);if(t?.cond==="Lost")return flash("err","Tool is marked lost.");
    const outAt=fts(new Date());
    setCos(p=>({...p,[id]:{by:by||user.name,userId:user.id,location:loc,note:note||"",outAt,inAt:null,ret:ret||""}}));
    const lh=ld("ct_lochist",{});lh[id]=lh[id]||[];lh[id].unshift({location:loc,by:by||user.name,at:outAt});sv("ct_lochist",lh);
    addFeed({type:"checkout",msg:(by||user.name)+" checked out "+t?.name+" → "+loc,ts:outAt});
    if(navigator.vibrate)navigator.vibrate(50);
    sConfirm({type:"out",name:t?.name});setTimeout(()=>sConfirm(null),1800);
    flash("ok","Checked out.");
  }
  function doIn(id){
    const inAt=fts(new Date());const co=cos[id];
    if(co){
      const t=tools.find(x=>x.id===id);const h=ld("ct_hist",[]);
      h.unshift({toolId:id,toolName:t?.name||id,by:co.by,location:co.location,note:co.note||"",outAt:co.outAt,inAt,ret:co.ret||""});
      sv("ct_hist",h);setHist(h);
      const lh=ld("ct_lochist",{});lh[id]=lh[id]||[];lh[id].unshift({location:co.location,by:user.name,at:inAt,action:"in"});sv("ct_lochist",lh);
      addFeed({type:"checkin",msg:user.name+" checked in "+t?.name+" from "+co.location,ts:inAt});
      if(navigator.vibrate)navigator.vibrate([50,30,50]);
      sConfirm({type:"in",name:t?.name});setTimeout(()=>sConfirm(null),1800);
    }
    setCos(p=>{const n={...p};delete n[id];return n});flash("ok","Checked in.");
  }
  function saveEdit(id){
    setTools(p=>p.map(t=>{if(t.id!==id)return t;const u={...t,...ed};if(ed.lastCal&&ed.calDays)u.nextCal=addD(ed.lastCal,parseInt(ed.calDays));return u}));
    sEI(null);flash("ok","Saved.");
  }
  function toggleFav(id){const f=favs.includes(id)?favs.filter(x=>x!==id):[id,...favs];setFavs(f);sv("ct_favs",f);}
  function toggleLock(id){const t=tools.find(x=>x.id===id);if(locked[id]){const nl={...locked};delete nl[id];sv("ct_locked",nl);setLocked(nl);flash("ok","Unlocked.")}else{const nl={...locked,[id]:{by:user.name,at:fts(new Date())}};sv("ct_locked",nl);setLocked(nl);flash("ok","Locked.")}}
  function exportHist(){
    const h=["Tool","By","Location","Note","Out","In","Expected Return"];
    const rows=hist.map(l=>[l.toolName,l.by,l.location,l.note||"",l.outAt,l.inAt||"Still Out",l.ret||""]);
    const blob=new Blob([[h,...rows].map(r=>r.map(v=>'"'+v+'"').join(",")).join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="checkouts_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  }

  const filtered=tools.filter(t=>{
    const ms=t.name.toLowerCase().includes(search.toLowerCase())||t.id.toLowerCase().includes(search.toLowerCase())||t.tag.toLowerCase().includes(search.toLowerCase());
    return ms&&(catF==="All"||t.cat===catF);
  }).sort((a,b)=>{const af=favs.includes(a.id)?0:1,bf=favs.includes(b.id)?0:1;return af-bf;});

  const TABS=[["tools","Tools"],["bySite","By Site"],["byPerson","By Person"],["history","History"]];

  return(
    <div className="fu">
      {confirm&&<div style={{position:"fixed",inset:0,zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
        <div className="fu" style={{background:confirm.type==="in"?T.gBg:T.accDim,border:"2px solid "+(confirm.type==="in"?T.gBd:T.acc),borderRadius:18,padding:"1.4rem 2rem",textAlign:"center"}}>
          <div style={{fontSize:42,lineHeight:1}}>{confirm.type==="in"?"✅":"📤"}</div>
          <div style={{fontSize:"0.95rem",fontWeight:800,color:confirm.type==="in"?T.green:T.acc,marginTop:"0.4rem"}}>{confirm.type==="in"?"Checked In":"Checked Out"}</div>
          <div style={{fontSize:"0.78rem",color:T.mut,marginTop:"0.15rem"}}>{confirm.name}</div>
        </div>
      </div>}
          <div style={{display:"flex",gap:"0.65rem",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap"}}>
        <div><h1 style={{fontSize:"1.35rem",fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>Tools</h1><p style={{fontSize:"0.77rem",color:T.mut,marginTop:"0.1rem"}}>{tools.length} tracked · {Object.keys(cos).length} out</p></div>
        <div style={{marginLeft:"auto"}}><I placeholder="Search…" value={search} onChange={e=>sSearch(e.target.value)} style={{width:180}}/></div>
      </div>
      <div style={{display:"flex",gap:"0.3rem",marginBottom:"0.7rem",flexWrap:"wrap"}}>
        {TABS.map(([id,lbl])=><button key={id} style={{background:tab===id?T.acc:T.faint,color:tab===id?"#fff":T.mut,border:"1px solid "+(tab===id?T.acc:T.border),borderRadius:8,padding:"0.32rem 0.8rem",fontWeight:600,fontSize:"0.78rem",cursor:"pointer"}} onClick={()=>setTab(id)}>{lbl}</button>)}
      </div>
      <Msg msg={msg}/>

      {tab==="tools"&&<>
        <div style={{display:"flex",gap:"0.3rem",marginBottom:"0.7rem",flexWrap:"wrap"}}>
          {cats.map(c=><button key={c} onClick={()=>sCatF(c)} style={{background:catF===c?T.text:T.faint,color:catF===c?T.bg:T.mut,border:"1px solid "+T.border,borderRadius:20,padding:"0.22rem 0.72rem",fontSize:"0.7rem",fontWeight:600,cursor:"pointer"}}>{c==="All"?"All":(CAT_ICONS[c]||"")+" "+c}</button>)}
        </div>
        {filtered.map((t,i)=>{
          const d=du(t.nextCal);const co=cos[t.id];const isLocked=!!locked[t.id];const editing=editId===t.id;
          const cc=CAT_C[t.cat]||{bg:T.faint,fg:T.mut};
          const pct=t.calDays?Math.max(0,Math.min(100,Math.round(((t.calDays-Math.max(0,d||0))/t.calDays)*100))):0;

                  <BA onClick={()=>saveEdit(t.id)}>Save Changes</BA>
                  <BB onClick={()=>sEI(null)}>Cancel</BB>
                  {t.cond!=="Lost"&&<BD onClick={()=>{setTools(p=>p.map(x=>x.id===t.id?{...x,cond:"Lost"}:x));sEI(null);flash("ok","Marked as lost.")}}>Mark Lost</BD>}

      </>}

      {tab==="bySite"&&<BySiteTab cos={cos} tools={tools} doIn={doIn} T={T}/>}

          return<div key={i} style={{background:T.card,borderRadius:11,padding:"0.82rem 1rem",marginBottom:"0.42rem",border:"1px solid "+T.border,borderLeft:"3px solid "+(l.inAt?T.green:T.orange)}}>

              {l.ret&&<span style={{fontSize:"0.65rem",color:T.mut}}>Back: {fdt(l.ret)}</span>}
              <span style={{marginLeft:"auto",fontSize:"0.7rem",color:T.mut}}>by <strong style={{color:T.text}}>{l.by}</strong></span>
            </div>
            {l.note&&<div style={{fontSize:"0.7rem",color:T.mut,marginBottom:"0.35rem",fontStyle:"italic"}}>📝 {l.note}</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"0.35rem"}}>
              {[["📍 Location",l.location,T.border],["🕐 Out",l.outAt,T.acc],["✅ In",l.inAt||"Not returned",l.inAt?T.green:T.orange]].map(([lbl,val,bc])=>(
                <div key={lbl} style={{background:T.faint,borderRadius:6,padding:"0.38rem 0.55rem",borderLeft:"2px solid "+bc}}>
                  <div style={{fontSize:"0.58rem",color:T.mut,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"0.1rem",fontWeight:600}}>{lbl}</div>
                  <div style={{fontSize:"0.75rem",color:T.text,fontWeight:600,wordBreak:"break-word"}}>{val}</div>

          </div>;
        })}
      </div>}
    </div>
  );
}

function MaintenancePage({tools,user,addFeed}){

  }

          <div key={lbl} style={{background:T.card,borderRadius:11,padding:"0.8rem 0.9rem",border:"1px solid "+T.border}}>
            <span style={{fontSize:17}}>{icon}</span>
            <div style={{fontSize:20,fontWeight:900,color,lineHeight:1,marginTop:"0.28rem"}}>{v}</div>
            <div style={{fontSize:10,color:T.mut,marginTop:"0.15rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{lbl}</div>
          </div>
        ))}
      </div>
      <Card style={{marginBottom:"1rem"}}>
        <SH>Log New Event</SH>
        <Msg msg={msg}/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:"0.6rem",marginBottom:"0.65rem"}}>
          <div><Lbl>Tool *</Lbl><S value={f.toolId} onChange={e=>sF({...f,toolId:e.target.value})}><option value="">Select tool…</option>{tools.map(t=><option key={t.id} value={t.id}>{t.id} — {t.name}</option>)}</S></div>
          <div><Lbl>Type</Lbl><S value={f.type} onChange={e=>sF({...f,type:e.target.value})}>{MAINT_T.map(t=><option key={t}>{t}</option>)}</S></div>
          <div><Lbl>Description *</Lbl><I value={f.desc} onChange={e=>sF({...f,desc:e.target.value})} placeholder="e.g. Replaced 9V battery"/></div>
          <div><Lbl>Cost ($)</Lbl><I type="number" value={f.cost} onChange={e=>sF({...f,cost:e.target.value})} placeholder="0.00"/></div>
        </div>
        <BA onClick={submit}>Log Event</BA>
      </Card>
      {logs.map(l=>(
        <div key={l.id} style={{background:T.card,borderRadius:11,padding:"0.78rem 0.95rem",marginBottom:"0.42rem",border:"1px solid "+T.border,borderLeft:"3px solid "+(tC[l.type]||T.mut)}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:"0.85rem",color:T.text}}>{l.toolName}</span>

            {l.cost&&<span style={{background:T.gBg,color:T.green,borderRadius:20,padding:"2px 7px",fontSize:"0.67rem",fontWeight:700,border:"1px solid "+T.gBd}}>${l.cost}</span>}
            <span style={{marginLeft:"auto",fontSize:"0.7rem",color:T.mut}}>by {l.by} · {l.date}</span>
          </div>
          <div style={{marginTop:"0.28rem",fontSize:"0.77rem",color:T.mut}}>{l.desc}</div>
        </div>
      ))}

  );
}

function ScoutPage({user,isAdmin}){
  const [tab,setTab]=useState("log");const [logs,setLogs]=useState(()=>ld("scout_logs",[]));const [kit,sKit]=useState({});
  const [f,sF]=useState({loc:"",ctype:"CAT6",cid:"",result:"PASS",wmap:true,len:"",poe:false,poev:"",fault:"",notes:""});
  const [msg,flash]=useMsg();
  function submit(){
    if(!f.loc)return flash("err","Location required.");
    const entry={id:Date.now(),date:fts(new Date()),tech:user.name,...f,len:f.len?parseFloat(f.len):null,poev:f.poe&&f.poev?parseFloat(f.poev):null};
    const u=[entry,...logs];setLogs(u);sv("scout_logs",u);
    sF({loc:"",ctype:"CAT6",cid:"",result:"PASS",wmap:true,len:"",poe:false,poev:"",fault:"",notes:""});flash("ok","Saved.");
  }
  function exportCSV(){
    const h=["Date","Tech","Location","Cable Type","Cable ID","Result","Wire Map","Length ft","PoE","PoE V","Fault","Notes"];
    const rows=logs.map(l=>[l.date,l.tech,l.loc,l.ctype,l.cid,l.result,l.wmap?"Yes":"No",l.len||"",l.poe?"Yes":"No",l.poev||"",l.fault||"",l.notes||""]);
    const blob=new Blob([[h,...rows].map(r=>r.map(v=>'"'+v+'"').join(",")).join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="scout_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  }
  const pass=logs.filter(l=>l.result==="PASS").length;const rate=logs.length?Math.round(pass/logs.length*100):0;
  return(
    <div className="fu">
      <div style={{display:"flex",gap:"0.65rem",alignItems:"center",marginBottom:"1rem"}}>
        <div style={{width:40,height:40,background:T.gBg,border:"1px solid "+T.gBd,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🔌</div>
        <div><h1 style={{fontSize:"1.2rem",fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>Klein Tools Scout Pro 3</h1><p style={{fontSize:"0.75rem",color:T.mut}}>T026 · CT-026 · Cal due Jun 15, 2027</p></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:"0.6rem",marginBottom:"1rem"}}>
        {[[logs.length,"📋","Tests",T.acc],[rate+"%","✅","Pass Rate",rate>=90?T.green:rate>=70?T.yellow:T.red],[logs.filter(l=>l.result==="FAIL").length,"❌","Failures",T.red],[logs.filter(l=>l.poe).length,"⚡","PoE Hits",T.blue]].map(([v,icon,lbl,color])=>(
          <div key={lbl} style={{background:T.card,borderRadius:11,padding:"0.78rem 0.9rem",border:"1px solid "+T.border}}>
            <span style={{fontSize:16}}>{icon}</span>
            <div style={{fontSize:20,fontWeight:900,color,lineHeight:1,marginTop:"0.28rem"}}>{v}</div>
            <div style={{fontSize:10,color:T.mut,marginTop:"0.15rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{lbl}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:"0.3rem",marginBottom:"0.85rem"}}>
        {[["log","Log Test"],["history","History"],["kit","Kit Check"]].map(([id,lbl])=><button key={id} style={{background:tab===id?T.acc:T.faint,color:tab===id?"#fff":T.mut,border:"1px solid "+(tab===id?T.acc:T.border),borderRadius:8,padding:"0.32rem 0.8rem",fontWeight:600,fontSize:"0.78rem",cursor:"pointer"}} onClick={()=>setTab(id)}>{lbl}</button>)}
      </div>
      <Msg msg={msg}/>
      {tab==="log"&&<Card>
        <SH>New Test Result</SH>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.65rem"}}>
          <div><Lbl>Location *</Lbl><I value={f.loc} onChange={e=>sF({...f,loc:e.target.value})} placeholder="e.g. Building A, Rm 204"/></div>
          <div><Lbl>Cable ID</Lbl><I value={f.cid} onChange={e=>sF({...f,cid:e.target.value})} placeholder="CAB-01A"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.65rem",marginTop:"0.6rem"}}>
          <div><Lbl>Cable Type</Lbl><S value={f.ctype} onChange={e=>sF({...f,ctype:e.target.value})}>{CABLE.map(c=><option key={c}>{c}</option>)}</S></div>
          <div><Lbl>Result</Lbl><S value={f.result} onChange={e=>sF({...f,result:e.target.value})} style={{fontWeight:700,color:f.result==="PASS"?T.green:f.result==="FAIL"?T.red:T.yellow}}><option>PASS</option><option>FAIL</option><option>PARTIAL</option></S></div>
          <div><Lbl>Length (ft)</Lbl><I type="number" value={f.len} onChange={e=>sF({...f,len:e.target.value})} placeholder="125"/></div>
        </div>
        <div style={{display:"flex",gap:"1.25rem",marginTop:"0.65rem",flexWrap:"wrap",alignItems:"center"}}>
          <label style={{display:"flex",gap:"0.35rem",alignItems:"center",cursor:"pointer",fontSize:"0.84rem",color:T.text,fontWeight:500}}><input type="checkbox" checked={f.wmap} onChange={e=>sF({...f,wmap:e.target.checked})} style={{accentColor:T.acc,width:15,height:15}}/>Wire Map OK</label>
          <label style={{display:"flex",gap:"0.35rem",alignItems:"center",cursor:"pointer",fontSize:"0.84rem",color:T.text,fontWeight:500}}><input type="checkbox" checked={f.poe} onChange={e=>sF({...f,poe:e.target.checked})} style={{accentColor:T.acc,width:15,height:15}}/>PoE Detected</label>
          {f.poe&&<div style={{display:"flex",alignItems:"center",gap:"0.35rem"}}><span style={{fontSize:"0.68rem",color:T.mut,fontWeight:600}}>Voltage:</span><I type="number" value={f.poev} onChange={e=>sF({...f,poev:e.target.value})} placeholder="V" style={{width:70}}/></div>}
        </div>
        {f.result!=="PASS"&&<div style={{marginTop:"0.6rem"}}><Lbl>Fault Description</Lbl><I value={f.fault} onChange={e=>sF({...f,fault:e.target.value})} placeholder="e.g. Open on pair 3-6"/></div>}
        <div style={{marginTop:"0.6rem"}}><Lbl>Notes</Lbl><I value={f.notes} onChange={e=>sF({...f,notes:e.target.value})} placeholder="Optional"/></div>
        <BA style={{marginTop:"0.9rem"}} onClick={submit}>Save Test Result</BA>
      </Card>}
      {tab==="history"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.65rem"}}>
          <span style={{fontSize:"0.79rem",color:T.mut}}>{logs.length} tests</span>

        {logs.length===0&&<Card style={{textAlign:"center",color:T.mut,padding:"2rem"}}>No tests yet.</Card>}
        {logs.map(l=>{const rc=l.result==="PASS"?{bg:T.gBg,b:T.gBd,fg:T.green}:l.result==="FAIL"?{bg:T.rBg,b:T.rBd,fg:T.red}:{bg:T.yBg,b:T.yBd,fg:T.yellow};return(

            <div style={{display:"flex",flexWrap:"wrap",gap:"0.32rem",alignItems:"center"}}>
              <span style={{background:rc.bg,border:"1px solid "+rc.b,color:rc.fg,borderRadius:20,padding:"2px 8px",fontSize:"0.7rem",fontWeight:700}}>{l.result}</span>
              <span style={{fontWeight:600,fontSize:"0.85rem",color:T.text}}>{l.ctype}</span>
              {l.cid&&<span style={{fontSize:"0.72rem",color:T.mut}}>#{l.cid}</span>}
              {l.len&&<span style={{fontSize:"0.72rem",color:T.mut}}>{l.len}ft</span>}
              <span style={{background:l.wmap?T.gBg:T.rBg,border:"1px solid "+(l.wmap?T.gBd:T.rBd),color:l.wmap?T.green:T.red,borderRadius:20,padding:"2px 6px",fontSize:"0.67rem",fontWeight:600}}>Map {l.wmap?"✓":"✗"}</span>
              {l.poe&&<span style={{background:T.bBg,border:"1px solid "+T.bBd,color:T.blue,borderRadius:20,padding:"2px 6px",fontSize:"0.67rem",fontWeight:600}}>PoE{l.poev?" "+l.poev+"V":""}</span>}
              <span style={{marginLeft:"auto",fontSize:"0.69rem",color:T.mut}}>{l.tech} · {l.loc}</span>
              {isAdmin&&<BD style={{fontSize:"0.69rem",padding:"0.2rem 0.5rem"}} onClick={()=>{const u=logs.filter(x=>x.id!==l.id);setLogs(u);sv("scout_logs",u)}}>Del</BD>}
            </div>
            {(l.fault||l.notes)&&<div style={{marginTop:"0.28rem",fontSize:"0.73rem",color:T.mut}}>{l.fault&&"⚠ "+l.fault+" "}{l.notes&&"— "+l.notes}</div>}
          </div>
        )})}
      </div>}
      {tab==="kit"&&<Card>
        <SH>Kit Checklist</SH>
        {KIT_S.map((item,i)=>(
          <label key={i} style={{display:"flex",gap:"0.55rem",alignItems:"center",padding:"0.42rem 0",borderBottom:"1px solid "+T.faint,cursor:"pointer"}}>
            <input type="checkbox" checked={!!kit[i]} onChange={e=>sKit({...kit,[i]:e.target.checked})} style={{accentColor:T.acc,width:15,height:15}}/>
            <span style={{fontSize:"0.84rem",color:kit[i]?T.green:T.text,fontWeight:kit[i]?600:400,textDecoration:kit[i]?"line-through":"none"}}>{item}</span>
            {kit[i]&&<span style={{marginLeft:"auto",fontSize:"0.68rem",color:T.green}}>✓</span>}
          </label>
        ))}
        <div style={{marginTop:"0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:"0.77rem",color:T.mut}}><strong style={{color:T.text}}>{Object.values(kit).filter(Boolean).length}</strong> / {KIT_S.length}</span>
          <BB style={{fontSize:"0.73rem",padding:"0.28rem 0.65rem"}} onClick={()=>sKit({})}>Reset</BB>
        </div>
      </Card>}
    </div>
  );
}

function ReportsPage({tools}){
  const hist=ld("ct_hist",[]);const maint=ld("ct_maint",[]);const scout=ld("scout_logs",[]);
  const topT={};hist.forEach(l=>{topT[l.toolId]=(topT[l.toolId]||0)+1});
  const topTSorted=Object.entries(topT).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const topU={};hist.forEach(l=>{topU[l.by]=(topU[l.by]||0)+1});
  const topUSorted=Object.entries(topU).sort((a,b)=>b[1]-a[1]);
  const avgDur=hist.filter(l=>l.inAt).map(l=>{const ms=new Date(l.inAt)-new Date(l.outAt);return isNaN(ms)?0:ms}).reduce((a,b,_,arr)=>a+b/arr.length,0);
  const avgH=Math.floor(avgDur/3600000),avgM=Math.floor((avgDur%3600000)/60000);
  const passRate=scout.length?Math.round(scout.filter(l=>l.result==="PASS").length/scout.length*100):0;
  const maintCost=maint.reduce((s,l)=>s+(parseFloat(l.cost)||0),0);
  const calCost=maint.filter(m=>m.type==="calibration").reduce((s,l)=>s+(parseFloat(l.cost)||0),0);
  const months={};hist.forEach(h=>{try{const d=new Date(h.outAt);const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");months[k]=(months[k]||0)+1}catch{}});
  const mSorted=Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  const mMax=Math.max(...mSorted.map(([,v])=>v),1);
  const now=new Date();const thirtyAgo=new Date(now-30*86400000);
  const activeIds=new Set(hist.filter(h=>new Date(h.outAt)>thirtyAgo).map(h=>h.toolId));
  const idle=tools.filter(t=>!activeIds.has(t.id));
  function exportCal(){
    const h=["Asset Tag","Tool","Category","Condition","Next Cal","Status","Last Cal"];
    const rows=tools.map(t=>{const d=du(t.nextCal);return[t.tag,t.name,t.cat,t.cond,t.nextCal||"Not set",d===null?"N/A":d<0?"OVERDUE":d+"d",t.lastCal||""]});
    const blob=new Blob([[h,...rows].map(r=>r.map(v=>'"'+v+'"').join(",")).join("\n")],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="cal_report_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  }
  function Bar({val,max,color}){return<div style={{background:T.faint,borderRadius:3,height:5,marginTop:"0.2rem"}}><div style={{background:color,borderRadius:3,height:5,width:Math.round((val/max)*100)+"%",transition:"width .5s"}}/></div>}
  return(
    <div className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div><h1 style={{fontSize:"1.35rem",fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>Reports</h1><p style={{fontSize:"0.77rem",color:T.mut}}>Full analytics</p></div>
        <BA onClick={exportCal}>📄 Cal Report</BA>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:"0.65rem",marginBottom:"1rem"}}>
        {[[hist.length,"📦","Checkouts",T.acc],[maint.length,"🔧","Maint. Events",T.yellow],[scout.length,"🔌","Cable Tests",T.green],[passRate+"%","✅","Scout Pass",passRate>=90?T.green:T.yellow],["$"+maintCost.toFixed(2),"💰","Maint. Cost",T.orange],["$"+calCost.toFixed(2),"📅","Cal Cost",T.purple],[avgDur?avgH+"h "+avgM+"m":"—","⏱","Avg Duration",T.blue]].map(([v,icon,lbl,color])=>(
          <div key={lbl} style={{background:T.card,borderRadius:11,padding:"0.82rem 0.95rem",border:"1px solid "+T.border}}>
            <span style={{fontSize:17}}>{icon}</span>
            <div style={{fontSize:20,fontWeight:900,color,lineHeight:1,marginTop:"0.28rem"}}>{v}</div>
            <div style={{fontSize:10,color:T.mut,marginTop:"0.15rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{lbl}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"1rem"}}>
        <Card>
          <SH>Most Checked Out</SH>
          {topTSorted.length===0&&<div style={{fontSize:"0.8rem",color:T.mut}}>No data yet.</div>}
          {topTSorted.map(([id,count])=>{const t=tools.find(x=>x.id===id);return<div key={id} style={{marginBottom:"0.45rem"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:"0.78rem",marginBottom:"0.1rem"}}><span style={{color:T.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"76%"}}>{t?.name||id}</span><span style={{color:T.mut,fontWeight:700,flexShrink:0}}>{count}x</span></div><Bar val={count} max={topTSorted[0][1]} color={T.acc}/></div>})}
        </Card>
        <Card>
          <SH>By User</SH>
          {topUSorted.length===0&&<div style={{fontSize:"0.8rem",color:T.mut}}>No data yet.</div>}
          {topUSorted.map(([name,count])=><div key={name} style={{marginBottom:"0.45rem"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:"0.78rem",marginBottom:"0.1rem"}}><span style={{color:T.text,fontWeight:500}}>{name}</span><span style={{color:T.mut,fontWeight:700}}>{count}</span></div><Bar val={count} max={topUSorted[0][1]} color={T.green}/></div>)}
        </Card>
        <Card>
          <SH>Cal Status</SH>
          {[["Overdue",tools.filter(t=>{const d=du(t.nextCal);return d!==null&&d<0}).length,T.red],["Due ≤30d",tools.filter(t=>{const d=du(t.nextCal);return d!==null&&d>=0&&d<=30}).length,T.yellow],["Due ≤90d",tools.filter(t=>{const d=du(t.nextCal);return d!==null&&d>30&&d<=90}).length,T.acc],["Current",tools.filter(t=>{const d=du(t.nextCal);return d===null||d>90}).length,T.green]].map(([lbl,count,color])=>(
            <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.35rem 0",borderBottom:"1px solid "+T.border}}>
              <span style={{fontSize:"0.8rem",color:T.text}}>{lbl}</span>
              <span style={{fontSize:"0.85rem",fontWeight:700,color}}>{count}</span>
            </div>
          ))}
        </Card>
        <Card>
          <SH>💤 Idle Tools (30d+)</SH>
          {idle.length===0&&<div style={{fontSize:"0.8rem",color:T.green}}>All tools used recently.</div>}
          {idle.slice(0,8).map(t=><div key={t.id} style={{display:"flex",gap:"0.45rem",alignItems:"center",padding:"0.3rem 0",borderBottom:"1px solid "+T.border}}>
            <span style={{fontSize:14}}>{CAT_ICONS[t.cat]||"🔩"}</span>
            <span style={{fontSize:"0.8rem",color:T.text,fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
            <span style={{fontSize:"0.68rem",color:T.mut,background:T.faint,borderRadius:4,padding:"1px 5px"}}>Idle</span>
          </div>)}
        </Card>
        {mSorted.length>0&&<Card>
          <SH>📅 Monthly Trend</SH>
          <div style={{display:"flex",gap:"0.4rem",alignItems:"flex-end",height:70}}>
            {mSorted.map(([month,count])=>(
              <div key={month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"0.2rem"}}>
                <div style={{fontSize:"0.66rem",color:T.mut,fontWeight:700}}>{count}</div>
                <div style={{width:"100%",background:T.acc,borderRadius:"3px 3px 0 0",height:Math.round((count/mMax)*50)+4+"px",minHeight:4}}/>
                <div style={{fontSize:"0.58rem",color:T.mut}}>{month.slice(5)}</div>
              </div>
            ))}
          </div>
        </Card>}
      </div>
    </div>
  );
}

function AdminPage({tools,setTools,cos,setCos,user,addFeed}){
  const [tab,setTab]=useState("live");
  const [hist,setHist]=useState(()=>ld("ct_hist",[]));
  const [filter,sFilter]=useState("");
  const [users,setUsers]=useState(()=>ld("ct_users",USERS_DEF));
  const [newU,sNU]=useState({name:"",username:"",password:"",role:"tech"});
  const [sites,setSites]=useState(()=>ld("ct_sites",SITES_DEF));
  const [newSite,sNS]=useState("");
  const [msg,flash]=useMsg();

  function addUser(){
    if(!newU.name||!newU.username||!newU.password)return flash("err","Fill all fields.");
    if(users.find(x=>x.username===newU.username))return flash("err","Username taken.");
    const u=[...users,{id:"u"+Date.now(),...newU}];setUsers(u);sv("ct_users",u);
    sNU({name:"",username:"",password:"",role:"tech"});flash("ok","User added.");
  }
  function removeUser(id){if(id==="u1")return flash("err","Cannot remove default admin.");if(!window.confirm("Remove this user?"))return;const u=users.filter(x=>x.id!==id);setUsers(u);sv("ct_users",u);}
  function changePass(id,pass){if(!pass)return;const u=users.map(x=>x.id===id?{...x,password:pass}:x);setUsers(u);sv("ct_users",u);flash("ok","Password updated.");}
  function forceIn(toolId){
    const inAt=fts(new Date());const co=cos[toolId];
    if(co){const t=tools.find(x=>x.id===toolId);const h=ld("ct_hist",[]);h.unshift({toolId,toolName:t?.name||toolId,by:co.by,location:co.location,note:co.note||"",outAt:co.outAt,inAt,ret:co.ret||""});sv("ct_hist",h);setHist(h);addFeed({type:"checkin",msg:"Admin forced check-in of "+(t?.name||toolId),ts:inAt});}
    setCos(p=>{const n={...p};delete n[toolId];return n});flash("ok","Forced check-in.");
  }
  function addSite(){if(!newSite.trim())return;const s=[...sites,newSite.trim()];setSites(s);sv("ct_sites",s);sNS("");}
  function removeSite(s){const ns=sites.filter(x=>x!==s);setSites(ns);sv("ct_sites",ns);}
  const filtered=hist.filter(l=>!filter||l.toolName.toLowerCase().includes(filter.toLowerCase())||l.by.toLowerCase().includes(filter.toLowerCase())||l.location.toLowerCase().includes(filter.toLowerCase()));
  const liveOut=Object.entries(cos);
  const TABS=[["live","Live"],["history","History"],["users","Users"],["sites","Sites"],["settings","Settings"]];

  return(
    <div className="fu">
      <div style={{marginBottom:"1.1rem"}}><h1 style={{fontSize:"1.35rem",fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>Admin Panel</h1></div>
      <div style={{display:"flex",gap:"0.3rem",marginBottom:"0.85rem",flexWrap:"wrap"}}>
        {TABS.map(([id,lbl])=><button key={id} style={{background:tab===id?T.acc:T.faint,color:tab===id?"#fff":T.mut,border:"1px solid "+(tab===id?T.acc:T.border),borderRadius:8,padding:"0.32rem 0.78rem",fontWeight:600,fontSize:"0.78rem",cursor:"pointer"}} onClick={()=>setTab(id)}>{lbl}</button>)}
      </div>
      <Msg msg={msg}/>

      {tab==="live"&&<div>
        {liveOut.length===0&&<Card style={{textAlign:"center",color:T.mut,padding:"2rem"}}>All tools checked in.</Card>}
        {liveOut.map(([id,co])=>{const t=tools.find(x=>x.id===id);return(
          <div key={id} style={{background:T.card,borderRadius:12,padding:"0.95rem 1.1rem",marginBottom:"0.55rem",border:"1px solid "+T.oBd,borderLeft:"4px solid "+T.orange}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.38rem",alignItems:"center",marginBottom:"0.6rem"}}>
              <span style={{fontSize:17}}>{CAT_ICONS[t?.cat]||"🔩"}</span>
              <span style={{fontWeight:800,fontSize:"0.9rem",color:T.text}}>{t?.name||id}</span>
              <span style={{fontSize:"0.63rem",background:T.faint,color:T.mut,borderRadius:4,padding:"1px 5px",fontWeight:700}}>{t?.tag||id}</span>
              <BD style={{marginLeft:"auto",fontSize:"0.75rem",padding:"0.3rem 0.65rem"}} onClick={()=>forceIn(id)}>Force Check In</BD>
              <BD style={{fontSize:"0.75rem",padding:"0.3rem 0.65rem"}} onClick={()=>{if(window.confirm("Mark as lost?"))setTools(p=>p.map(x=>x.id===id?{...x,cond:"Lost"}:x))}}>Mark Lost</BD>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:"0.45rem"}}>
              {[["👤 By",co.by,T.blue],["📍 Location",co.location,T.text],["🕐 Out At",co.outAt,T.orange]].map(([lbl,val,color])=>(
                <div key={lbl} style={{background:T.faint,borderRadius:7,padding:"0.48rem 0.65rem",border:"1px solid "+T.border}}>
                  <div style={{fontSize:"0.6rem",color:T.mut,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"0.12rem",fontWeight:600}}>{lbl}</div>
                  <div style={{fontSize:"0.8rem",fontWeight:700,color,wordBreak:"break-word"}}>{val}</div>
                </div>
              ))}
            </div>
            {co.note&&<div style={{marginTop:"0.4rem",fontSize:"0.73rem",color:T.mut,fontStyle:"italic"}}>📝 {co.note}</div>}
          </div>
        )})}
      </div>}

      {tab==="history"&&<div>
        <div style={{display:"flex",gap:"0.4rem",alignItems:"center",marginBottom:"0.7rem",flexWrap:"wrap"}}>
          <I placeholder="Filter…" value={filter} onChange={e=>sFilter(e.target.value)} style={{width:200}}/>
          <BA onClick={()=>{const h=["Tool","By","Location","Note","Out","In","Return"];const rows=filtered.map(l=>[l.toolName,l.by,l.location,l.note||"",l.outAt,l.inAt||"Still Out",l.ret||""]);const blob=new Blob([[h,...rows].map(r=>r.map(v=>'"'+v+'"').join(",")).join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="history_"+new Date().toISOString().slice(0,10)+".csv";a.click()}}>Export</BA>
          {hist.length>0&&<BD onClick={()=>{if(window.confirm("Clear all checkout history?")){{sv("ct_hist",[]);setHist([])}}}}>Clear All</BD>}
        </div>
        {filtered.length===0&&<Card style={{textAlign:"center",color:T.mut,padding:"2rem"}}>No history.</Card>}
        {filtered.map((l,i)=>{
          let dur="Still Out";if(l.inAt){const ms=new Date(l.inAt)-new Date(l.outAt);if(!isNaN(ms)){const hh=Math.floor(ms/3600000),mm=Math.floor((ms%3600000)/60000);dur=hh+"h "+mm+"m";}}
          return<div key={i} style={{background:T.card,borderRadius:11,padding:"0.8rem 0.95rem",marginBottom:"0.42rem",border:"1px solid "+T.border,borderLeft:"3px solid "+(l.inAt?T.green:T.orange)}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.35rem",alignItems:"center",marginBottom:"0.45rem"}}>
              <span style={{fontWeight:700,fontSize:"0.85rem",color:T.text}}>{l.toolName}</span>
              {l.inAt?<span style={{background:T.gBg,border:"1px solid "+T.gBd,color:T.green,borderRadius:20,padding:"2px 7px",fontSize:"0.67rem",fontWeight:700}}>✓ {dur}</span>:<span style={{background:T.oBg,border:"1px solid "+T.oBd,color:T.orange,borderRadius:20,padding:"2px 7px",fontSize:"0.67rem",fontWeight:700}}>● Out</span>}
              <span style={{marginLeft:"auto",fontSize:"0.7rem",color:T.mut}}>by <strong style={{color:T.text}}>{l.by}</strong></span>
            </div>
            {l.note&&<div style={{fontSize:"0.7rem",color:T.mut,marginBottom:"0.38rem",fontStyle:"italic"}}>📝 {l.note}</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"0.35rem"}}>
              {[["📍",l.location,T.border],["🕐 Out",l.outAt,T.acc],["✅ In",l.inAt||"Not returned",l.inAt?T.green:T.orange]].map(([lbl,val,bc])=>(
                <div key={lbl} style={{background:T.faint,borderRadius:6,padding:"0.38rem 0.55rem",borderLeft:"2px solid "+bc}}>
                  <div style={{fontSize:"0.58rem",color:T.mut,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"0.1rem",fontWeight:600}}>{lbl}</div>
                  <div style={{fontSize:"0.74rem",color:T.text,fontWeight:600,wordBreak:"break-word"}}>{val}</div>
                </div>
              ))}
            </div>
          </div>;
        })}
      </div>}

      {tab==="users"&&<div>
        <Card style={{marginBottom:"1rem"}}>
          <SH>Add User</SH>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:"0.55rem",marginBottom:"0.65rem"}}>
            {[["Name","name","text"],["Username","username","text"],["Password","password","password"]].map(([lbl,key,type])=>(
              <div key={key}><Lbl>{lbl}</Lbl><I type={type} value={newU[key]} onChange={e=>sNU({...newU,[key]:e.target.value})} placeholder={lbl}/></div>
            ))}
            <div><Lbl>Role</Lbl><S value={newU.role} onChange={e=>sNU({...newU,role:e.target.value})}><option value="tech">Technician</option><option value="admin">Admin</option></S></div>
          </div>
          <BA onClick={addUser}>Add User</BA>
        </Card>
        <Card>
          <SH>All Users ({users.length})</SH>
          {users.map(u=><UserRow key={u.id} u={u} changePass={changePass} removeUser={removeUser}/>)}
        </Card>
      </div>}

      {tab==="sites"&&<Card>
        <SH>Job Sites</SH>
        <div style={{display:"flex",gap:"0.5rem",marginBottom:"1rem"}}>
          <I value={newSite} onChange={e=>sNS(e.target.value)} placeholder="New site name" onKeyDown={e=>e.key==="Enter"&&addSite()}/>
          <BA onClick={addSite}>Add</BA>
        </div>
        {sites.map(s=><div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.45rem 0",borderBottom:"1px solid "+T.border}}>
          <span style={{fontSize:"0.83rem",color:T.text}}>📍 {s}</span>
          <BD style={{fontSize:"0.73rem",padding:"0.22rem 0.55rem"}} onClick={()=>removeSite(s)}>Remove</BD>
        </div>)}
      </Card>}

      {tab==="settings"&&<div>
        <Card style={{marginBottom:"1rem"}}>
          <SH>Credentials</SH>
          <div style={{fontFamily:"monospace",fontSize:"0.82rem",color:T.mut,lineHeight:2,background:T.faint,borderRadius:8,padding:"0.75rem 1rem"}}>
            <div><span style={{color:T.acc}}>Username:</span> <span style={{color:T.text}}>llblue</span></div>
            <div><span style={{color:T.acc}}>Password:</span> <span style={{color:T.text}}>caldue365</span></div>
            <div><span style={{color:T.acc}}>Admin Code:</span> <span style={{color:T.text}}>ADMIN1</span></div>
          </div>
        </Card>
        <PinSettingsPanel/>
        <Card style={{marginTop:"1rem"}}>
          <SH>Overdue Return Threshold</SH>
          <ThreshPanel/>
        </Card>
        <Card style={{marginTop:"1rem"}}>
          <SH>Danger Zone</SH>
          <BD onClick={()=>{if(window.confirm("Reset ALL app data? This cannot be undone.")){localStorage.clear();window.location.reload()}}}>Reset All Data</BD>
        </Card>
      </div>}
    </div>
  );
}

function UserRow({u,changePass,removeUser}){
  const [editPass,sEP]=useState("");
  return(
    <div style={{display:"flex",gap:"0.6rem",alignItems:"center",padding:"0.6rem 0",borderBottom:"1px solid "+T.border,flexWrap:"wrap"}}>
      <div style={{width:30,height:30,background:u.role==="admin"?T.accDim:T.faint,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{u.role==="admin"?"🛡️":"👤"}</div>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:"0.84rem",color:T.text}}>{u.name}</div><div style={{fontSize:"0.7rem",color:T.mut}}>@{u.username} · <span style={{color:u.role==="admin"?T.acc:T.mut,fontWeight:600}}>{u.role}</span></div></div>
      <I type="password" placeholder="New password" value={editPass} onChange={e=>sEP(e.target.value)} style={{width:120,padding:"0.32rem 0.55rem",fontSize:"0.77rem"}}/>
      <BB style={{fontSize:"0.73rem",padding:"0.32rem 0.6rem"}} onClick={()=>{changePass(u.id,editPass);sEP("")}}>Update</BB>
      {u.id!=="u1"&&<BD style={{fontSize:"0.73rem",padding:"0.32rem 0.6rem"}} onClick={()=>removeUser(u.id)}>Remove</BD>}
    </div>
  );
}

function PinSettingsPanel(){
  const [np,sNP]=useState("");const [cf,sCF]=useState("");const [msg,flash]=useMsg();const cur=ld("ct_pin","");
  return(
    <Card>
      <SH>PIN Lock (auto-locks after 10 min)</SH>
      <Msg msg={msg}/>
      {cur&&<div style={{background:T.gBg,border:"1px solid "+T.gBd,color:T.green,borderRadius:8,padding:"0.45rem 0.7rem",marginBottom:"0.65rem",fontSize:"0.8rem"}}>✓ PIN is set</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.65rem",marginBottom:"0.65rem"}}>
        <div><Lbl>New PIN (4 digits)</Lbl><I type="password" maxLength={4} value={np} onChange={e=>sNP(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="••••" style={{letterSpacing:"0.3em",fontSize:"1.1rem"}}/></div>
        <div><Lbl>Confirm</Lbl><I type="password" maxLength={4} value={cf} onChange={e=>sCF(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="••••" style={{letterSpacing:"0.3em",fontSize:"1.1rem"}}/></div>
      </div>
      <div style={{display:"flex",gap:"0.5rem"}}>
        <BA onClick={()=>{if(np.length!==4)return flash("err","Must be 4 digits");if(np!==cf)return flash("err","PINs don't match");sv("ct_pin",np);flash("ok","PIN set");sNP("");sCF("")}}>Set PIN</BA>
        <BD onClick={()=>{sv("ct_pin","");sNP("");sCF("");flash("ok","PIN removed")}}>Remove PIN</BD>
      </div>
    </Card>
  );
}

function ThreshPanel(){
  const [v,sV]=useState(()=>ld("ct_thresh",7));
  return(
    <div style={{display:"flex",gap:"0.5rem",alignItems:"center"}}>
      <I type="number" min={1} max={30} value={v} onChange={e=>sV(parseInt(e.target.value)||7)} style={{width:80}}/>
      <span style={{fontSize:"0.82rem",color:T.mut}}>days before flagging overdue return</span>
      <BA onClick={()=>{sv("ct_thresh",v);alert("Saved: "+v+" days")}}>Save</BA>
    </div>
  );
}

function ProfilePage({user,setUser}){
  const hist=ld("ct_hist",[]).filter(l=>l.by===user.name);
  const onTime=hist.filter(h=>h.inAt&&(!h.ret||new Date(h.inAt)<=new Date(h.ret))).length;
  const rate=hist.length?Math.round(onTime/hist.length*100):100;
  const [np,sNP]=useState("");const [cf,sCF]=useState("");const [msg,flash]=useMsg();
  function changePass(){
    if(np.length<4)return flash("err","Min 4 characters");if(np!==cf)return flash("err","Don't match");
    const users=ld("ct_users",USERS_DEF);const u=users.map(x=>x.id===user.id?{...x,password:np}:x);sv("ct_users",u);
    const updated={...user,password:np};setUser(updated);sessionStorage.setItem("ct_user",JSON.stringify(updated));
    sNP("");sCF("");flash("ok","Password updated.");
  }
  return(
    <div className="fu">
      <div style={{marginBottom:"1.1rem"}}><h1 style={{fontSize:"1.35rem",fontWeight:800,color:T.text,letterSpacing:"-0.02em"}}>My Profile</h1><p style={{fontSize:"0.77rem",color:T.mut}}>@{user.username} · {user.role}</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"0.6rem",marginBottom:"1rem"}}>
        {[[hist.length,"📦","My Checkouts",T.acc],[rate+"%","⏱","On-Time Rate",rate>=90?T.green:rate>=70?T.yellow:T.red],[new Set(hist.map(h=>h.location)).size,"📍","Sites Visited",T.blue]].map(([v,icon,lbl,color])=>(
          <div key={lbl} style={{background:T.card,borderRadius:11,padding:"0.82rem 0.95rem",border:"1px solid "+T.border}}>
            <span style={{fontSize:18}}>{icon}</span>
            <div style={{fontSize:22,fontWeight:900,color,lineHeight:1,marginTop:"0.28rem"}}>{v}</div>
            <div style={{fontSize:10,color:T.mut,marginTop:"0.15rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{lbl}</div>
          </div>
        ))}
      </div>
      <Card>
        <SH>Change Password</SH>
        <Msg msg={msg}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.65rem",marginBottom:"0.65rem"}}>
          <div><Lbl>New Password</Lbl><I type="password" value={np} onChange={e=>sNP(e.target.value)} placeholder="New password"/></div>
          <div><Lbl>Confirm</Lbl><I type="password" value={cf} onChange={e=>sCF(e.target.value)} placeholder="Confirm"/></div>
        </div>
        <BA onClick={changePass}>Update Password</BA>
      </Card>
    </div>
  );
}


function AdminUnlock({onUnlock}){
  const [show,setShow]=useState(false);
  const [code,setCode]=useState("");
  const [err,setErr]=useState(false);
  function check(){
    if(code==="ADMIN1"){onUnlock();setShow(false);setCode("");}
    else{setErr(true);setCode("");setTimeout(()=>setErr(false),700);}
  }
  if(!show)return<button onClick={()=>setShow(true)} style={{background:T.faint,color:T.mut,border:"1px solid "+T.border,borderRadius:7,padding:"0.25rem 0.6rem",fontWeight:600,fontSize:"0.72rem",cursor:"pointer"}}>Admin</button>;
  return(
    <div style={{display:"flex",gap:"0.3rem",alignItems:"center"}}>
      <input type="password" autoFocus value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")check();if(e.key==="Escape"){setShow(false);setCode("");}}} placeholder="Admin code…" style={{background:T.faint,border:"1.5px solid "+(err?T.rBd:T.border),borderRadius:7,color:T.text,padding:"0.25rem 0.55rem",fontSize:"0.78rem",outline:"none",width:110}}/>
      <button onClick={check} style={{background:T.acc,color:"#fff",border:"none",borderRadius:7,padding:"0.25rem 0.55rem",fontWeight:600,fontSize:"0.72rem",cursor:"pointer"}}>Go</button>
      <button onClick={()=>{setShow(false);setCode("")}} style={{background:T.faint,color:T.mut,border:"1px solid "+T.border,borderRadius:7,padding:"0.25rem 0.4rem",fontSize:"0.72rem",cursor:"pointer"}}>✕</button>
    </div>
  );
}

function App(){
  const [dark,setDark]=useState(()=>{const s=ld("ct_dark",null);if(s!==null)return s;return window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches});
  {const appT=dark?DARK_T:LIGHT_T;Object.keys(appT).forEach(k=>{T[k]=appT[k];});}
  useEffect(()=>{
    const appT=dark?DARK_T:LIGHT_T;
    Object.keys(appT).forEach(k=>{T[k]=appT[k];});
    document.body.style.background=T.bg;
    document.body.style.color=T.text;
    setThemeKey(k=>k+1);
  },[dark]);
  const [user,setUser]=useState(()=>{const s=sessionStorage.getItem("ct_user");return s?JSON.parse(s):null});
  const [tab,setTab]=useState("dashboard");
  const [tools,setTools]=useState(()=>{const s=ld("ct_tools",null);return(s&&s.length)?s:TOOLS});
  const [cos,setCos]=useState(()=>ld("ct_co",{}));
  const [feed,setFeed]=useState(()=>ld("ct_feed",[]));
  const [ann,setAnn]=useState(()=>ld("ct_ann",""));
  const [pinLocked,setPinLocked]=useState(false);
  const [briefing,sBriefing]=useState(true);
  const [isAdmin,setIsAdmin]=useState(false);
  const [themeKey,setThemeKey]=useState(0);
  const idleRef=useRef(null);
  const pinEnabled=!!ld("ct_pin","");

  useEffect(()=>sv("ct_tools",tools),[tools]);
  useEffect(()=>sv("ct_co",cos),[cos]);
  useEffect(()=>sv("ct_feed",feed),[feed]);
  useEffect(()=>sv("ct_ann",ann),[ann]);
  useEffect(()=>sv("ct_dark",dark),[dark]);
  useEffect(()=>{if(user)setIsAdmin(user.role==="admin");},[user]);

  useEffect(()=>{
    if(!pinEnabled||!user)return;
    const reset=()=>{clearTimeout(idleRef.current);idleRef.current=setTimeout(()=>setPinLocked(true),10*60*1000)};
    ["mousedown","keydown","touchstart","scroll"].forEach(e=>window.addEventListener(e,reset));
    reset();
    return()=>{clearTimeout(idleRef.current);["mousedown","keydown","touchstart","scroll"].forEach(e=>window.removeEventListener(e,reset))};
  },[user,pinEnabled]);

  useEffect(()=>{
    setTools(p=>p.map(t=>{const d=du(t.nextCal);if(d!==null&&d<-90&&t.cond==="Good")return{...t,cond:"Fair"};return t}));
  },[]);

  function login(u){sessionStorage.setItem("ct_user",JSON.stringify(u));setUser(u)}
  function logout(){sessionStorage.removeItem("ct_user");setUser(null)}
  function addFeed(item){setFeed(p=>[item,...p].slice(0,100))}
  function quickCheckout(toolId,loc,ret){
    const outAt=fts(new Date());
    setCos(p=>({...p,[toolId]:{by:user.name,userId:user.id,location:loc,note:"",outAt,inAt:null,ret:ret||""}}));
    const t=tools.find(x=>x.id===toolId);
    addFeed({type:"checkout",msg:user.name+" checked out "+t?.name+" → "+loc,ts:outAt});
  }

  if(!user)return<Login onLogin={login}/>;
  if(pinLocked&&pinEnabled)return<PinLock onUnlock={()=>setPinLocked(false)}/>;
  const od=tools.filter(t=>{const d=du(t.nextCal);return d!==null&&d<0});
  const sn=tools.filter(t=>{const d=du(t.nextCal);return d!==null&&d>=0&&d<=7});
  const myOut=Object.entries(cos).filter(([,co])=>co.by===user.name);

  const PAGES=[["dashboard","🏠","Home"],["tools","🔧","Tools"],["scout","🔌","Scout"],["maintenance","🛠","Maint."],["reports","📊","Reports"],["barcodes","🏷","Codes"],["profile","👤","Me"],...(isAdmin?[["admin","⚙","Admin"]]:[])] ;

  return(
    <div key={themeKey} style={{minHeight:"100vh",background:T.bg,color:T.text}}>
      <div className="np" style={{background:T.surf,borderBottom:"1px solid "+T.border,padding:"0 0.85rem",display:"flex",alignItems:"center",gap:"0.3rem",height:48,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.4rem",marginRight:"0.35rem",flexShrink:0}}>
          <div style={{width:24,height:24,background:T.acc,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🔧</div>
          <span style={{fontWeight:900,fontSize:"0.88rem",color:T.text,letterSpacing:"-0.02em"}}>CalTrack</span>
        </div>
        <div className="dn" style={{display:"flex",gap:"0.18rem",overflowX:"auto",flex:1}}>
          {PAGES.map(([id,icon,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{background:tab===id?T.accDim:"transparent",color:tab===id?T.acc:T.mut,border:"1px solid "+(tab===id?T.acc+"44":"transparent"),borderRadius:7,padding:"0.28rem 0.6rem",fontWeight:600,fontSize:"0.76rem",cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:"0.25rem",minHeight:34}}>
              <span>{icon}</span><span>{lbl}</span>
            </button>
          ))}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:"0.3rem",alignItems:"center",flexShrink:0}}>
          <button onClick={()=>setDark(!dark)} style={{background:T.faint,color:T.mut,border:"1px solid "+T.border,borderRadius:7,padding:"0.25rem 0.5rem",fontSize:"0.8rem",cursor:"pointer"}}>{dark?"☀️":"🌙"}</button>
          {isAdmin
            ?<button onClick={()=>setIsAdmin(false)} style={{background:T.accDim,color:T.acc,border:"1px solid "+T.acc+"44",borderRadius:7,padding:"0.25rem 0.6rem",fontWeight:600,fontSize:"0.72rem",cursor:"pointer"}}>Admin ✕</button>
            :<AdminUnlock onUnlock={()=>setIsAdmin(true)}/>
          }
          <span style={{fontSize:"0.73rem",color:T.mut,fontWeight:500,maxWidth:65,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</span>
          <button style={{background:T.faint,color:T.mut,border:"1px solid "+T.border,borderRadius:7,padding:"0.25rem 0.55rem",fontWeight:600,fontSize:"0.73rem",cursor:"pointer"}} onClick={logout}>Sign Out</button>
        </div>
      </div>

      {briefing&&(od.length>0||sn.length>0||myOut.length>0)&&<div style={{background:T.accDim,borderBottom:"1px solid "+T.acc+"44",padding:"0.55rem 1rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"0.5rem",flexWrap:"wrap"}}>
        <div style={{fontSize:"0.79rem",color:T.text,display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
          <span style={{fontWeight:700,color:T.acc}}>☀️ Today:</span>
          {od.length>0&&<span style={{color:T.red}}>⚠ {od.length} overdue cal</span>}
          {sn.length>0&&<span style={{color:T.yellow}}>⏰ {sn.length} due this week</span>}
          {myOut.length>0&&<span style={{color:T.orange}}>📦 You have {myOut.length} tool{myOut.length>1?"s":""} out</span>}
        </div>
        <button onClick={()=>sBriefing(false)} style={{background:"none",border:"none",color:T.mut,cursor:"pointer",fontSize:"0.75rem",fontWeight:600,flexShrink:0}}>Dismiss</button>
      </div>}

      <div className="pc" style={{padding:"1rem",maxWidth:1080,margin:"0 auto"}}>
        {tab==="dashboard"&&<Dashboard tools={tools} cos={cos} feed={feed} onQC={quickCheckout} ann={ann} setAnn={setAnn} isAdmin={isAdmin} user={user}/>}
        {tab==="tools"&&<ToolsPage tools={tools} setTools={setTools} isAdmin={isAdmin} cos={cos} setCos={setCos} user={user} addFeed={addFeed}/>}
        {tab==="scout"&&<ScoutPage user={user} isAdmin={isAdmin}/>}
        {tab==="maintenance"&&<MaintenancePage tools={tools} user={user} addFeed={addFeed}/>}
        {tab==="reports"&&<ReportsPage tools={tools}/>}
        {tab==="barcodes"&&<BarcodesPage tools={tools}/>}
        {tab==="profile"&&<ProfilePage user={user} setUser={setUser}/>}
        {tab==="admin"&&<AdminPage tools={tools} setTools={setTools} cos={cos} setCos={setCos} user={user} addFeed={addFeed}/>}
      </div>

      <div className="bnav np" style={{display:"none",position:"fixed",bottom:0,left:0,right:0,background:T.surf,borderTop:"1px solid "+T.border,zIndex:200,padding:"0.25rem 0 0.4rem",justifyContent:"space-around",alignItems:"center"}}>
        {PAGES.slice(0,7).map(([id,icon,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.18rem",cursor:"pointer",padding:"0.25rem 0.4rem",borderRadius:7,minWidth:40}}>
            <span style={{fontSize:18,lineHeight:1,opacity:tab===id?1:0.5}}>{icon}</span>
            <span style={{fontSize:"0.58rem",fontWeight:tab===id?700:500,color:tab===id?T.acc:T.mut,letterSpacing:"0.02em"}}>{lbl}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>


</body></html>
